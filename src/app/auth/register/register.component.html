<div class="container d-flex justify-content-center align-items-center">
    <form [formGroup]="registerForm" (submit)="register()">
        <div class="mb3">
            <label for="inputUsername">Username</label>
            <input formControlName="username" type="text" class="form-control" id="inputUsername" placeholder="Username">
            <div class="text-danger" *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.invalid">
                <small *ngIf="registerForm.get('username')?.errors?.['required']">Username is required</small>
                <small *ngIf="registerForm.get('username')?.errors?.['minlength']">At least 4 characters required</small>
            </div>
        </div>

        <div class="mb3">
            <label for="inputEmail">Email</label>
            <input formControlName="email" type="email" class="form-control" id="inputEmail" placeholder="Email">
            <div class="text-danger" *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
                <small *ngIf="registerForm.get('email')?.errors?.['required']">Email is required</small>
                <small *ngIf="registerForm.get('email')?.errors?.['email']">Email should have a valid form email&#64;domen.address</small>
            </div>
        </div>

        <div class="mb3">
            <label for="inputPassword">Password</label>
            <input formControlName="password" type="password" class="form-control" id="inputPassword" placeholder="Password">
            <div class="text-danger" *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
                <small *ngIf="registerForm.get('password')?.errors?.['required']">Password is required</small>
                <small *ngIf="registerForm.get('password')?.errors?.['minlength']">Password should have at least 8 characters</small>
            </div>
        </div>

        <div class="mb-3">
            <label for="inputPasswordConfirm">Confirm Password</label>
            <input formControlName="confirmPassword" type="password" class="form-control" id="inputPasswordConfirm" placeholder="Confirm Password">
            <div class="text-danger" *ngIf="registerForm.get('confirmPassword')?.touched && registerForm.get('confirmPassword')?.invalid">
                <small *ngIf="registerForm.get('confirmPassword')?.errors?.['required']">Confirmation is required.</small>
                <small *ngIf="registerForm.get('confirmPassword')?.errors?.['isMatching']">Passwords must match.</small>
            </div>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-primary" [disabled]="!this.registerForm.valid">Sign in</button>
            <div class="d-flex align-item-center gap-2">
                <p class="mb-0">You already have an account? Consider</p>
                <a routerLink="/login" routerLinkActive="true">Logging in</a>
            </div>
        </div>
    </form>
</div>
