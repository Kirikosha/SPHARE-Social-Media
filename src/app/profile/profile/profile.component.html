<div class="row">
    @if (memberModel){
        <div class="col"></div>
        <div class="profile-info col-9 text-start">
            <div class="profile-pic-wrapper mb-3 mt-3">
                <img src="assets/user.png" alt="Profile Picture" class="profile-pic">
            </div>
            <p>{{memberModel.username}}</p>
            <p>Joined at {{memberModel.joinedAt}}</p>
            <div class="d-flex stat">
                <p>N following</p>
                <p>N followers</p>
            </div>
        </div>
        <div class="col"></div>
        <div class="tabs">
            <h2>Tabs should be here</h2>
        </div>
    } @else {
        <div class="col">
            <h2>Loading...</h2>
        </div>
    }
</div>
